services:
  moor:
    image: ghcr.io/caiopizzol/moor:latest
    # build: .  # uncomment for local dev
    expose:
      - "3000"
    # Admin UI bound to loopback. Reach it via SSH tunnel:
    #   ssh -L 8080:127.0.0.1:3000 your-server
    # Change to "3000:3000" to expose publicly (not recommended without auth).
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - moor-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      # Required on first boot. If no admin exists, moor creates one with this
      # password. If an admin already exists, this is ignored with a warning.
      # Pick a strong value, boot once, then optionally remove this line.
      - MOOR_INITIAL_PASSWORD=change-me-before-first-boot
      # Uncomment to reset an existing admin's password (also clears sessions).
      # Use one or the other, not both.
      # - MOOR_RESET_PASSWORD=your-new-password

  caddy:
    image: caddy:2-alpine
    depends_on:
      moor:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - moor-data:/app/data:ro
      - caddy-data:/data
      - caddy-config:/config
    command: caddy run --config /app/data/Caddyfile --adapter caddyfile
    restart: unless-stopped

volumes:
  moor-data:
  caddy-data:
  caddy-config:
