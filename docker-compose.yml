services:
  moor:
    image: ghcr.io/caiopizzol/moor:latest
    # build: .  # uncomment for local dev
    expose:
      - "3000"
    # Uncomment to access directly without Caddy (e.g. local dev):
    # ports:
    #   - "3000:3000"
    volumes:
      - moor-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
    # environment:
    #   - MOOR_RESET_PASSWORD=your-new-password

  caddy:
    image: caddy:2-alpine
    depends_on:
      moor:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - moor-data:/app/data:ro
      - caddy-data:/data
      - caddy-config:/config
    command: caddy run --config /app/data/Caddyfile --adapter caddyfile
    restart: unless-stopped

volumes:
  moor-data:
  caddy-data:
  caddy-config:
