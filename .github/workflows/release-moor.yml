name: Release moor

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/respawner/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "package.json"
      - ".releaserc.json"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx biome check .
      - run: bunx tsc --noEmit -p apps/api/tsconfig.json
      - run: cd apps/web && bunx tsc -b
      # #80 PR #3: respawner image build + self-test. Fails the check
      # job (before publish) if the image can't even self-validate
      # against the runner's mounted Docker socket.
      - name: Build moor-respawner (test only)
        run: docker build -t moor-respawner-test apps/respawner
      - name: Respawner self-test
        run: docker run --rm -v /var/run/docker.sock:/var/run/docker.sock moor-respawner-test --self-test

  release:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    outputs:
      version: ${{ steps.semrel.outputs.version }}
      sha: ${{ steps.semrel.outputs.sha }}
      released: ${{ steps.semrel.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - id: pre
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # semantic-release commits the version bump via @semantic-release/git,
      # so HEAD here is the chore(release) commit when a release was cut.
      # Compare against the pre-run SHA to know whether to publish at all —
      # workflow_dispatch with no release-worthy commits would otherwise
      # republish the existing tag and mutate it.
      - id: semrel
        run: |
          head="$(git rev-parse HEAD)"
          if [ "$head" = "${{ steps.pre.outputs.sha }}" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            echo "released=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$(bun -e "console.log(require('./package.json').version)")" >> "$GITHUB_OUTPUT"
          echo "sha=$head" >> "$GITHUB_OUTPUT"

  publish:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.sha }}
      - name: Verify build context matches release tag
        run: |
          echo "HEAD: $(git rev-parse HEAD)"
          echo "package.json version: $(node -e "console.log(require('./package.json').version)")"
          echo "tag to publish: ${{ needs.release.outputs.version }}"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push moor
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/caiopizzol/moor:latest
            ghcr.io/caiopizzol/moor:${{ needs.release.outputs.version }}
          cache-from: type=gha,scope=moor
          cache-to: type=gha,mode=max,scope=moor
      # #80 PR #3: build/push moor-respawner from the SAME release SHA
      # and tag with the SAME version as moor. The respawner is an
      # implementation detail of a moor release, not its own product —
      # tagging them together means moor can pull
      # ghcr.io/caiopizzol/moor-respawner:<its-own-version> and be
      # confident the contracts match.
      - name: Build & push moor-respawner
        uses: docker/build-push-action@v6
        with:
          context: apps/respawner
          push: true
          tags: |
            ghcr.io/caiopizzol/moor-respawner:latest
            ghcr.io/caiopizzol/moor-respawner:${{ needs.release.outputs.version }}
          cache-from: type=gha,scope=respawner
          cache-to: type=gha,mode=max,scope=respawner
