services:
  moor:
    image: ghcr.io/caiopizzol/moor:latest
    # build: .  # uncomment for local dev
    expose:
      - "3000"
    # Admin UI bound to loopback. Reach it via SSH tunnel:
    #   ssh -L 8080:127.0.0.1:3000 your-server
    # Change to "3000:3000" to expose publicly (not recommended without auth).
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - moor-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional (#140). moor runs in a container, so its Disk card only sees
      # filesystems mounted in here. To report a separate host data volume,
      # bind-mount it read-only and list it in MOOR_MONITORED_DISKS below:
      # - /mnt/your-data-volume:/host/mnt/your-data-volume:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
    environment:
      # Read from .env on the host. The installer generates a random
      # MOOR_INITIAL_PASSWORD on first run. Create-only: ignored once an
      # admin exists, so the line is safe to leave in place.
      - MOOR_INITIAL_PASSWORD
      # Optional. Set MOOR_API_KEY=<value> in .env to enable bearer-token
      # access for the CLI, MCP, and external tooling. Treat the value like
      # SSH access: it grants full admin rights. The installer can generate
      # this for you with `--with-api-key`. Unset = bearer auth disabled.
      - MOOR_API_KEY
      # Uncomment to reset an existing admin's password (also clears sessions).
      # Use one or the other, not both - moor refuses to start if both are set.
      # - MOOR_RESET_PASSWORD
      # Optional. Set MOOR_CLEANUP_DANGLING_INTERVAL_HOURS=<hours> in .env
      # to enable scheduled dangling-image cleanup. Off by default.
      # Accepted range: ~0.017 hours (1 minute) to 596 hours (~24 days).
      # See docs/self-hosting.md.
      - MOOR_CLEANUP_DANGLING_INTERVAL_HOURS
      # Optional. Set MOOR_DB_BACKUP_INTERVAL_HOURS=<hours> in .env to
      # enable scheduled SQLite snapshots (VACUUM INTO) of moor.db. Off
      # by default. Snapshots land next to moor.db; the 7 most recent
      # are retained. Required for moor_update_status to report
      # safe_to_update: YES on the manual update path.
      # Accepted range: ~0.017 hours (1 minute) to 596 hours (~24 days).
      # See docs/self-hosting.md.
      - MOOR_DB_BACKUP_INTERVAL_HOURS
      # Optional (#140). Report host data volumes the moor container can't
      # otherwise see. Comma-separated `containerPath|label` entries, where
      # containerPath is a read-only bind mount declared above, e.g.
      # MOOR_MONITORED_DISKS=/host/mnt/your-data-volume|Project data
      # See docs/self-hosting.md.
      - MOOR_MONITORED_DISKS

  caddy:
    image: caddy:2-alpine
    depends_on:
      moor:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - moor-data:/app/data:ro
      - caddy-data:/data
      - caddy-config:/config
    command: caddy run --config /app/data/Caddyfile --adapter caddyfile
    restart: unless-stopped

volumes:
  moor-data:
  caddy-data:
  caddy-config:
