name: Release moor

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "package.json"
      - ".releaserc.json"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx biome check .
      - run: bunx tsc --noEmit -p apps/api/tsconfig.json
      - run: cd apps/web && bunx tsc -b

  release:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    outputs:
      version: ${{ steps.semrel.outputs.version }}
      sha: ${{ steps.semrel.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # semantic-release commits the version bump via @semantic-release/git,
      # so HEAD here is the chore(release) commit. Capture its SHA so the
      # publish job builds from the post-bump commit, not the triggering SHA.
      - id: semrel
        run: |
          echo "version=$(bun -e "console.log(require('./package.json').version)")" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.sha }}
      - name: Verify build context matches release tag
        run: |
          echo "HEAD: $(git rev-parse HEAD)"
          echo "package.json version: $(node -e "console.log(require('./package.json').version)")"
          echo "tag to publish: ${{ needs.release.outputs.version }}"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/caiopizzol/moor:latest
            ghcr.io/caiopizzol/moor:${{ needs.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
