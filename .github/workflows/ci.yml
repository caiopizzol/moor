name: CI

# PRs only. Pushes to main are validated by each release-*.yml workflow's
# own check job; running ci.yml again here would be duplicate work.
on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx biome check .
      - run: bunx tsc --noEmit -p apps/api/tsconfig.json
      - run: cd apps/web && bunx tsc -b
